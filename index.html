<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>The Blueprint — Charlie McKae</title>
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg:#0c1512;
  --panel:#131f1a;
  --panel-2:#1a2a22;
  --line:#28382f;
  --line-soft:#1f2c25;
  --amber:#e8a23d;
  --amber-dim:#a97426;
  --amber-glow:rgba(232,162,61,.35);
  --chalk:#f2efe3;
  --muted:#7f9488;
  --muted-2:#5a6b60;
  --good:#7fbf8f;
  --soft-red:#d9836f;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--chalk);}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  min-height:100dvh;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  background-image:
    radial-gradient(circle at 15% 0%, rgba(232,162,61,.05), transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(127,148,136,.06), transparent 50%);
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Teko',sans-serif; font-weight:600; letter-spacing:.02em;}

::-webkit-scrollbar{width:0;height:0;}

/* ---------- HEADER / SCOREBOARD ---------- */
header.top{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(180deg, #0c1512 80%, rgba(12,21,18,0));
  padding:calc(14px + env(safe-area-inset-top)) 18px 10px;
}
.eyebrow{
  font-size:11px; letter-spacing:.22em; color:var(--amber); font-weight:700;
  text-transform:uppercase; margin-bottom:2px;
}
.title-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.title-row h1{
  font-family:'Teko',sans-serif; font-weight:700; font-size:34px; line-height:1;
  margin:0; letter-spacing:.01em; color:var(--chalk);
}
.title-row .sub{color:var(--muted); font-size:12.5px; margin-top:2px;}

.scoreboard{
  margin-top:12px; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; gap:16px;
}
.sb-stat{text-align:center; flex:0 0 auto;}
.sb-stat .num{font-family:'Teko',sans-serif; font-weight:700; font-size:30px; color:var(--amber); line-height:1; text-shadow:0 0 18px var(--amber-glow);}
.sb-stat .lbl{font-size:9.5px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; margin-top:1px;}
.sb-div{width:1px; align-self:stretch; background:var(--line);}
.sb-dots{flex:1; display:flex; flex-wrap:wrap; gap:4px; align-items:center;}
.sb-dot{width:8px; height:8px; border-radius:50%; background:var(--line-soft); border:1px solid var(--line);}
.sb-dot.on{background:var(--amber); border-color:var(--amber); box-shadow:0 0 6px var(--amber-glow);}
.sb-dot.today{outline:2px solid var(--chalk); outline-offset:1px;}

/* ---------- NAV ---------- */
nav.tabs{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:#0f1a15ee; backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex; padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
nav.tabs button{
  flex:1; background:none; border:none; color:var(--muted); font-family:'Inter',sans-serif;
  font-size:11px; font-weight:600; letter-spacing:.03em; padding:8px 4px 6px; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer;
}
nav.tabs button .ic{font-size:18px; line-height:1;}
nav.tabs button.active{color:var(--amber);}
nav.tabs button.active .ic{filter:drop-shadow(0 0 6px var(--amber-glow));}

main{padding:14px 18px 30px; max-width:760px; margin:0 auto;}

/* ---------- CARDS / SECTIONS ---------- */
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; margin-bottom:14px;
}
.section-h{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.section-h h3{
  font-family:'Teko',sans-serif; font-weight:600; font-size:20px; letter-spacing:.03em;
  margin:0; color:var(--chalk); text-transform:uppercase;
}
.section-h .frac{font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace;}

.feel-row{display:flex; gap:8px; margin-top:2px;}
.feel-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
  padding:12px 6px 10px; cursor:pointer; color:var(--muted);
}
.feel-btn svg{width:24px; height:24px; fill:var(--muted-2); transition:transform .15s;}
.feel-btn .flbl{font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.02em;}
.feel-btn.active{background:rgba(232,162,61,.14); border-color:var(--amber);}
.feel-btn.active svg{fill:var(--amber);}
.feel-btn.active .flbl{color:var(--amber);}

.swap-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:9px 10px 9px 12px; margin-bottom:10px;
}
.swap-lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600; flex:0 0 auto;}
select.swap-select{
  flex:1; min-width:0; background:var(--panel); border:1px solid var(--line); color:var(--amber);
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600; border-radius:8px; padding:7px 8px;
  -webkit-appearance:none; appearance:none;
}
select.swap-select:focus{outline:2px solid var(--amber);}

.check-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px;}
.check-item{
  display:flex; align-items:center; gap:11px; padding:9px 6px; border-radius:9px; cursor:pointer;
  transition:background .15s;
}
.check-item:active{background:var(--panel-2);}
.check-item .box{
  flex:0 0 22px; width:22px; height:22px; border-radius:6px; border:2px solid var(--muted-2);
  display:flex; align-items:center; justify-content:center; transition:.15s;
}
.check-item.done .box{background:var(--amber); border-color:var(--amber);}
.check-item .box svg{width:13px; height:13px; opacity:0; transform:scale(.6); transition:.15s;}
.check-item.done .box svg{opacity:1; transform:scale(1);}
.check-item span.txt{font-size:14.5px; color:var(--chalk); line-height:1.35;}
.check-item.done span.txt{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--muted-2);}

/* Today view */
.day-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px;}
.day-nav button.arrow{
  background:var(--panel); border:1px solid var(--line); color:var(--amber); width:40px; height:40px;
  border-radius:50%; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.day-nav button.arrow:disabled{opacity:.25;}
.day-nav .center{text-align:center; flex:1;}
.day-nav .wk-tag{font-size:10.5px; letter-spacing:.12em; color:var(--amber); text-transform:uppercase; font-weight:700;}
.day-nav .dow{font-family:'Teko',sans-serif; font-weight:700; font-size:26px; color:var(--chalk); line-height:1.1;}
.day-nav .datestr{font-size:12px; color:var(--muted);}

.mission-banner{
  background:linear-gradient(135deg, var(--panel-2), var(--panel)); border:1px solid var(--line);
  border-left:3px solid var(--amber); border-radius:12px; padding:14px 16px; margin-bottom:14px;
}
.mission-banner .m-eyebrow{font-size:10px; letter-spacing:.16em; color:var(--amber); text-transform:uppercase; font-weight:700; margin-bottom:4px;}
.mission-banner p{margin:0; font-size:15px; color:var(--chalk); line-height:1.4; font-weight:500;}

.ring-mini{
  width:52px; height:52px; border-radius:50%; flex:0 0 52px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.ring-mini .in{position:absolute; inset:5px; border-radius:50%; background:var(--panel); display:flex; align-items:center; justify-content:center; font-family:'Teko',sans-serif; font-weight:700; font-size:14px; color:var(--amber);}

textarea.journal{
  width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  color:var(--chalk); font-family:'Inter',sans-serif; font-size:14px; padding:10px 12px;
  min-height:56px; resize:vertical; line-height:1.4;
}
textarea.journal::placeholder{color:var(--muted-2);}
label.jq{display:block; font-size:12.5px; color:var(--muted); margin:10px 0 5px; font-weight:600;}

.quote-card{
  background:var(--panel-2); border:1px dashed var(--line); border-radius:12px; padding:14px 16px; margin-top:4px;
}
.quote-card .qlabel{font-size:10px; letter-spacing:.16em; color:var(--amber); text-transform:uppercase; font-weight:700; margin-bottom:6px;}
.quote-card p{margin:0; font-style:italic; color:var(--chalk); font-size:14.5px; line-height:1.45;}
.quote-card .qsub{margin-top:8px; font-size:12px; color:var(--muted); font-style:normal; line-height:1.4;}

/* Days grid */
.week-block{margin-bottom:20px;}
.week-title{display:flex; align-items:baseline; gap:8px; margin:0 2px 8px;}
.week-title .w-name{font-family:'Teko',sans-serif; font-weight:700; font-size:20px; color:var(--amber); text-transform:uppercase;}
.week-title .w-range{font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace;}
.day-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:8px;}
.day-tile{
  background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 6px 7px;
  display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; position:relative;
}
.day-tile.today{border-color:var(--amber);}
.day-tile .ring{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.day-tile .ring .center{width:28px; height:28px; border-radius:50%; background:var(--panel); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--chalk);}
.day-tile .dlabel{font-size:9.5px; color:var(--muted); text-align:center; line-height:1.2;}
.day-tile.complete .dlabel{color:var(--amber);}

/* Weekly scoreboards */
.wk-score-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-soft);}
.wk-score-row:last-child{border-bottom:none;}
.wk-score-row .lbl{flex:0 0 108px; font-size:12.5px; color:var(--chalk);}
.bar-track{flex:1; height:7px; background:var(--panel-2); border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg,var(--amber-dim),var(--amber)); border-radius:5px;}
.wk-score-row .frac{flex:0 0 40px; text-align:right; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);}

.subtab-row{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px;}
.subtab-row button{
  flex:0 0 auto; background:var(--panel); border:1px solid var(--line); color:var(--muted);
  padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap;
}
.subtab-row button.active{background:var(--amber); border-color:var(--amber); color:#1a1207;}

textarea.review{
  width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  color:var(--chalk); font-family:'Inter',sans-serif; font-size:14px; padding:10px 12px;
  min-height:48px; resize:vertical; margin-bottom:10px;
}

/* Rules / library */
.rule-item{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--line-soft);}
.rule-item:last-child{border-bottom:none;}
.rule-num{font-family:'Teko',sans-serif; font-weight:700; font-size:26px; color:var(--amber); flex:0 0 34px;}
.rule-txt b{display:block; color:var(--chalk); font-size:14.5px; margin-bottom:2px;}
.rule-txt span{color:var(--muted); font-size:13px; line-height:1.4;}

table.standards{width:100%; border-collapse:collapse; font-size:13px;}
table.standards td{padding:8px 6px; border-bottom:1px solid var(--line-soft); color:var(--chalk);}
table.standards td:last-child{color:var(--amber); text-align:right; font-family:'JetBrains Mono',monospace; font-size:12px;}

.safety-box{background:rgba(217,131,111,.08); border:1px solid rgba(217,131,111,.35); border-radius:12px; padding:13px 15px; margin-top:6px;}
.safety-box .slabel{font-size:10px; letter-spacing:.14em; color:var(--soft-red); text-transform:uppercase; font-weight:700; margin-bottom:5px;}
.safety-box p{margin:0; font-size:13px; color:var(--chalk); line-height:1.5;}

details.lib{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; overflow:hidden;}
details.lib summary{padding:12px 14px; font-weight:600; font-size:14px; color:var(--chalk); cursor:pointer; list-style:none; display:flex; justify-content:space-between; align-items:center;}
details.lib summary::-webkit-details-marker{display:none;}
details.lib summary::after{content:'+'; color:var(--amber); font-size:18px;}
details.lib[open] summary::after{content:'–';}
details.lib .lib-body{padding:0 14px 14px; color:var(--muted); font-size:13px; line-height:1.5;}
details.lib .lib-body div{margin-bottom:4px;}

.reset-row{text-align:center; margin-top:6px;}
.reset-row button{background:none; border:none; color:var(--muted-2); font-size:11.5px; text-decoration:underline; cursor:pointer; padding:8px;}

.footer-note{text-align:center; color:var(--muted-2); font-size:11px; padding:18px 10px 4px; line-height:1.6;}
.sync-pill{display:inline-block; font-size:10px; letter-spacing:.06em; color:var(--muted-2); background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:4px 10px;}
.sync-pill.on{color:var(--good); border-color:rgba(127,191,143,.4);}

.closing{
  text-align:center; padding:22px 10px;
}
.closing .cl-eyebrow{font-size:10px; letter-spacing:.18em; color:var(--amber); text-transform:uppercase; font-weight:700; margin-bottom:8px;}
.closing p{color:var(--muted); font-size:13.5px; line-height:1.6; max-width:440px; margin:0 auto 10px;}
.closing .standard{font-family:'Teko',sans-serif; font-weight:700; font-size:22px; color:var(--chalk); margin-top:8px;}

@media (min-width:640px){
  main{padding-left:24px; padding-right:24px;}
}
</style>
</head>

function isEditingField(){
  const ae = document.activeElement;
  return ae && (ae.tagName==='TEXTAREA' || ae.tagName==='INPUT');
}

async function storageGet(key){
  if (fbReady){
    try {
      const doc = await fbDB.collection('blueprint').doc(SYNC_DOC_ID).get();
      if (doc.exists && doc.data().state){
        const json = JSON.stringify(doc.data().state);
        try { localStorage.setItem(key, json); } catch(e){}
        return json;
      }
    } catch(e){ console.warn('Cloud fetch failed, falling back to local copy.', e); }
  }
  if (window.storage){
    try { const r = await window.storage.get(key); return r ? r.value : null; } catch(e){ return null; }
  }
  try { return localStorage.getItem(key); } catch(e){ return null; }
}

async function storageSet(key, val){
  try { localStorage.setItem(key, val); } catch(e){}
  if (fbReady){
    try {
      await fbDB.collection('blueprint').doc(SYNC_DOC_ID).set({ state: JSON.parse(val), updated: Date.now() });
      return;
    } catch(e){ console.warn('Cloud save failed, saved on this device only.', e); }
  }
  if (window.storage){
    try { await window.storage.set(key, val); } catch(e){}
  }
}

function setupLiveSync(){
  if (!fbReady) return;
  fbDB.collection('blueprint').doc(SYNC_DOC_ID)
    .onSnapshot({ includeMetadataChanges:true }, doc=>{
      if (doc.metadata.hasPendingWrites) return; // ignore the echo of our own write
      if (!doc.exists) return;
      const data = doc.data();
      if (!data || !data.state) return;
      STATE = data.state;
      ensureState();
      if (!isEditingField()) renderApp();
    });
}

/* ============ HELPERS ============ */
function fmtDate(str){
  const d = new Date(str+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'});
}
function shortDate(str){
  const d = new Date(str+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short', day:'numeric'});
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dayTotals(idx){
  const d = DAYS[idx], s = STATE.days[d.date];
  const arrs = [s.nonneg, s.mob, s.arm, s.hit, s.assign];
  let done=0, total=0;
  arrs.forEach(a=>{ done += a.filter(Boolean).length; total += a.length; });
  total++; if (s.armFeel) done++;
  if (s.j1.trim()) done++; total++;
  if (s.j2.trim()) done++; total++;
  return {done, total, pct: total? Math.round(done/total*100):0};
}
function dayComplete(idx){ const t = dayTotals(idx); return t.total>0 && t.done===t.total; }
function ringGradient(pct){
  return `conic-gradient(var(--amber) ${pct*3.6}deg, var(--line-soft) 0deg)`;
}
function overallStats(){
  let complete=0;
  DAYS.forEach((d,i)=>{ if(dayComplete(i)) complete++; });
  let streak=0;
  for(let i=DAYS.length-1;i>=0;i--){ if(dayComplete(i)) streak++; else break; }
  const t = todayStr();
  let dayIdx = DAYS.findIndex(d=>d.date===t);
  return {complete, total:DAYS.length, streak, todayIdx: dayIdx};
}

/* week aggregate scoreboard */
function weekAgg(week){
  const idxs = week.idx;
  const n = idxs.length;
  let mob=0, arm=0, hitc=0, journ=0, sleep=0;
  const isWeek1 = week.id === 'week1';
  let catchTarget=isWeek1?1:4, catchDone=0, longTarget=isWeek1?1:2, longDone=0, bullTarget=1, bullDone=0;
  let strengthTarget=3, strengthDone=0, speedTarget=2, speedDone=0;
  idxs.forEach(i=>{
    const d = DAYS[i], s = STATE.days[d.date];
    if (s.mob.every(Boolean)) mob++;
    if (s.arm.every(Boolean)) arm++;
    if (s.hit.every(Boolean)) hitc++;
    if (s.j1.trim() && s.j2.trim()) journ++;
    if (s.nonneg[4]) sleep++;
    if (s.throwLbl.startsWith('Play catch') && s.armFeel) catchDone++;
    if (s.throwLbl.startsWith('Long toss') && s.armFeel) longDone++;
    if (s.throwLbl.startsWith('Bullpen') && s.armFeel) bullDone++;
    if (s.assignKey){
      const a = ASSIGN[s.assignKey];
      const complete = s.assign.length && s.assign.every(Boolean);
      if (a.type==='strength' && complete) strengthDone++;
      if (a.type==='speed' && complete) speedDone++;
    }
  });
  return [
    ['Mobility', mob, n], ['Arm Care', arm, n], ['Hitting/Swing', hitc, n],
    ['Catch Play', catchDone, catchTarget], ['Long Toss', longDone, longTarget], ['Bullpen', bullDone, bullTarget],
    ['Strength', strengthDone, strengthTarget], ['Speed', speedDone, speedTarget],
    ['Journal', journ, 2], ['Sleep routine', sleep, n]
  ];
}

      </li>`).join('');
    body += `<div class="subtab-row">${tabs}</div>
    <div class="card">
      <div class="section-h"><h3>${w.label} Review</h3><span class="frac mono">${w.range}</span></div>
      <ul class="check-list">${checks}</ul>
    </div>
    <div class="card">
      <label class="jq">Biggest win</label>
      <textarea class="review" data-rf="win" placeholder="What went right this week?">${rs.win}</textarea>
      <label class="jq">Hardest part</label>
      <textarea class="review" data-rf="hard" placeholder="What was tough?">${rs.hard}</textarea>
      <label class="jq">Next week I will attack</label>
      <textarea class="review" data-rf="next" placeholder="One or two things to focus on">${rs.next}</textarea>
    </div>`;
  }

  document.getElementById('app').innerHTML = subtabs + body;

  document.querySelectorAll('[data-sub]').forEach(el=>{
    el.onclick = ()=>{ WEEKLY_SUB = el.dataset.sub; renderWeekly(); };
  });
  document.querySelectorAll('[data-rw]').forEach(el=>{
    el.onclick = ()=>{ REVIEW_WEEK = el.dataset.rw; renderWeekly(); };
  });
  document.querySelectorAll('[data-ri]').forEach(el=>{
    el.onclick = ()=>{
      const i = +el.dataset.ri;
      const rs = STATE.reviews[REVIEW_WEEK];
      rs.checks[i] = !rs.checks[i];
      queueSave(); renderWeekly();
    };
  });
  document.querySelectorAll('textarea.review').forEach(el=>{
    el.oninput = ()=>{ STATE.reviews[REVIEW_WEEK][el.dataset.rf] = el.value; queueSave(); };
  });
}

function libSection(title, items){
  return `<details class="lib"><summary>${title}</summary><div class="lib-body">${items.map(x=>`<div>• ${x}</div>`).join('')}</div></details>`;
}

function renderRules(){
  let html = `<div class="card">
    <div class="section-h"><h3>The Blueprint Rules</h3></div>
    ${RULES.map((r,i)=>`<div class="rule-item"><div class="rule-num">${i+1}</div><div class="rule-txt"><b>${r[0]}</b><span>${r[1]}</span></div></div>`).join('')}
  </div>

  <div class="card">
    <div class="section-h"><h3>Weekly Standards</h3></div>
    <table class="standards">${STANDARDS.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>
    <div class="safety-box">
      <div class="slabel">Safety Standard</div>
      <p>Lift with excellent technique. Stop if pain changes your movement. Throwing should build gradually and never chase max effort when the arm feels tired. When in doubt, ask a coach or parent.</p>
    </div>
  </div>

  <div class="card">
    <div class="section-h"><h3>Workout Library</h3></div>
    ${libSection('Strength A: Lower Body + Rotation', ASSIGN.STRENGTH_A.items)}
    ${libSection('Strength B: Posterior Chain + Athletic Control', ASSIGN.STRENGTH_B.items)}
    ${libSection('Strength C: Full Body + Stability', ASSIGN.STRENGTH_C.items)}
    ${libSection('Speed A: Acceleration', ASSIGN.SPEED_A.items)}
    ${libSection('Speed B: Agility + Reaction', ASSIGN.SPEED_B.items)}
    ${libSection('Road Strength', ASSIGN.ROAD_STRENGTH.items)}
    ${libSection('Road Speed', ASSIGN.ROAD_SPEED.items)}
    ${libSection('No-Bat Hitting Substitute', HIT_B)}
  </div>

  <div class="closing">
    <div class="cl-eyebrow">Closing Message</div>
    <p>Volume 1 is not about proving you are already there. It is about proving you are willing to build. Every box you check is a vote for the player you want to become.</p>
    <div class="standard">One rep. One workout. One day. One phase. Keep stacking.</div>
  </div>

  <div class="footer-note">${fbReady ? 'Progress syncs automatically across every device on this link.' : 'Data is saved on this device/browser only.'}<br>Add this page to your Home Screen for one-tap access.</div>
  <div style="text-align:center;margin-top:6px;"><span class="sync-pill ${fbReady?'on':''}">${fbReady?'● Cloud sync on':'○ This device only'}</span></div>
  `;
  document.getElementById('app').innerHTML = html;
}

function setActiveTab(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===TAB);
  });
}

function renderApp(){
  if (TAB==='today') renderToday();
  else if (TAB==='days') renderDaysGrid();
  else if (TAB==='weekly') renderWeekly();
  else if (TAB==='rules') renderRules();
  renderScoreboard();
}

document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.onclick = ()=>{ TAB = b.dataset.tab; setActiveTab(); renderApp(); };
});

/* ============ INIT ============ */
async function init(){
  const raw = await storageGet(STORE_KEY);
  if (raw){
    try { STATE = JSON.parse(raw); } catch(e){ STATE = {days:{}, reviews:{}}; }
  }
  ensureState();
  const st = overallStats();
  CUR_DAY = st.todayIdx >= 0 ? st.todayIdx : 0;
  setActiveTab();
  renderApp();
  setupLiveSync();
}
init();
</script>
</body>
